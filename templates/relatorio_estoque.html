{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h1 class="h3">Relatorio de estoque</h1><button class="btn btn-brand no-print" onclick="window.print()">Imprimir PDF</button></div>
<table class="table table-bordered"><thead><tr><th>Codigo</th><th>Nome</th><th>Marca</th><th>Categoria</th><th>Preco</th><th>Quantidade</th></tr></thead><tbody>{% for p in produtos %}<tr><td>{{ p.codigo }}</td><td>{{ p.nome }}</td><td>{{ p.marca }}</td><td>{{ p.categoria }}</td><td>R$ {{ "%.2f"|format(p.preco) }}</td><td>{{ p.quantidade }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
