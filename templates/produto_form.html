{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">{{ "Editar produto" if produto else "Criar produto" }}</h1>
<form method="post" enctype="multipart/form-data" class="row g-3">
  {% set p = produto %}
  <div class="col-md-6"><label class="form-label">Nome</label><input class="form-control" name="nome" value="{{ p.nome if p else '' }}" required></div>
  <div class="col-md-3"><label class="form-label">Codigo</label><input class="form-control" name="codigo" value="{{ p.codigo if p else '' }}" required></div>
  <div class="col-md-3"><label class="form-label">Marca</label><select class="form-select" name="marca" required><option {% if p and p.marca == 'Natura' %}selected{% endif %}>Natura</option><option {% if p and p.marca == 'Avon' %}selected{% endif %}>Avon</option></select></div>
  <div class="col-md-3"><label class="form-label">Preco</label><input class="form-control" name="preco" type="number" step="0.01" value="{{ p.preco if p else '' }}" required></div>
  <div class="col-md-3"><label class="form-label">Quantidade</label><input class="form-control" name="quantidade" type="number" min="0" value="{{ p.quantidade if p else 0 }}" required></div>
  <div class="col-md-3"><label class="form-label">Estoque minimo</label><input class="form-control" name="estoque_minimo" type="number" min="0" value="{{ p.estoque_minimo if p else 3 }}"></div>
  <div class="col-md-3"><label class="form-label">Categoria</label><input class="form-control" name="categoria" value="{{ p.categoria if p else '' }}" required></div>
  <div class="col-12"><label class="form-label">Descricao</label><textarea class="form-control" name="descricao" rows="4">{{ p.descricao if p else '' }}</textarea></div>
  <div class="col-md-6"><label class="form-label">Imagem</label><input class="form-control" name="imagem" type="file" accept="image/*"></div>
  <div class="col-md-6 d-flex align-items-end"><div class="form-check"><input class="form-check-input" type="checkbox" name="destaque" id="destaque" {% if p and p.destaque %}checked{% endif %}><label class="form-check-label" for="destaque">Exibir em destaque</label></div></div>
  <div class="col-12"><button class="btn btn-brand">Salvar</button> <a class="btn btn-outline-secondary" href="{{ url_for('produto.admin_produtos') }}">Cancelar</a></div>
</form>
{% endblock %}
