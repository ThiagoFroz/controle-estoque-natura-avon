{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Area administrativa</h1>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input class="form-control" name="usuario" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input class="form-control" type="password" name="senha" required>
          </div>
          <button class="btn btn-brand w-100">Entrar</button>
        </form>
        <p class="text-muted small mt-3 mb-0">Acesso: anafroz, sandrafroz ou thifroz</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
